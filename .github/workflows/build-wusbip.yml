name: Build wusbip

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Install WDK via NuGet
      shell: powershell
      run: |
        nuget install Microsoft.Windows.WDK.x64 -OutputDirectory "$env:TEMP\wdk"
        nuget install Microsoft.Windows.SDK.CPP -OutputDirectory "$env:TEMP\wdk"
        nuget install Microsoft.Windows.SDK.CPP.x64 -OutputDirectory "$env:TEMP\wdk"

    - name: Run bootstrap
      shell: cmd
      run: bootstrap.bat

    - name: Build resources (generates messages.h)
      shell: cmd
      run: |
        msbuild userspace\resources\resources.vcxproj ^
          /p:Configuration=Release ^
          /p:Platform=x64 ^
          /m

    - name: Build libusbip
      shell: cmd
      run: |
        msbuild userspace\libusbip\libusbip.vcxproj ^
          /p:Configuration=Release ^
          /p:Platform=x64 ^
          /m

    - name: Build wusbip
      shell: cmd
      run: |
        msbuild userspace\wusbip\wusbip.vcxproj ^
          /p:Configuration=Release ^
          /p:Platform=x64 ^
          /m

    - name: Upload wusbip.exe
      uses: actions/upload-artifact@v4
      with:
        name: wusbip-release
        path: userspace/wusbip/x64/Release/wusbip.exe
